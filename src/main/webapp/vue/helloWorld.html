<!DOCTYPE html>
<html lang="en" xmlns:v-bind="http://www.w3.org/1999/xhtml" xmlns:v-on="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>vue hello world</title>

    <script src="./vue.min.js"></script>
</head>
<body>
<div id = "app">
    <span>{{message}}</span>
    <div v-bind:title="message">
         鼠标悬停几秒钟查看此处动态绑定的提示信息！
   </div>
    <div v-if="flag==1">现在条件成立</div>
    <ul v-for="item in todos">
        <li>{{item.text}}</li>
    </ul>
    <div>
        <button v-on:click="reverseMessage">反转消息</button>
        <input type="text" v-model="message">
    </div>

    //组件
    <todo-item v-for="item in groceryList" v-bind:todo="item" v-bind:key="item.id"
        @modelevent="printaaa">
        <h4>插槽</h4>
    </todo-item>
</div>
<script type="text/javascript">
    // vue对象
    var app = new Vue({
        el: '#app',
        data: {
            message: 'hello vue!',
            flag: '0',
            todos:[
                { text: '学习 JavaScript' },
                { text: '学习 Vue' },
                { text: '整个牛项目' }
            ],
            groceryList: [
                { id: 0, text: '蔬菜' },
                { id: 1, text: '奶酪' },
                { id: 2, text: '随便其它什么人吃的东西' }
            ]
        },
        methods: {
            reverseMessage: function () {
                this.message = this.message.split('').reverse().join('')
            },
            printaaa: function (e) {
                console.log(e+":aaaaaaaaa");
            }
        }
    })

    // 定义全局组件todo-item
    Vue.component('todo-item', {
        props: ['todo'],    // 定义属性todo
        data: function(){   // 定义数据
            return {
                count:0,
            }
        },
        // 模板
        template: '<url><li v-on:click="aaa">{{ todo.text }}<slot></slot></li></url>',
        // 定义方法
        methods:{
            aaa: function () {
                this.count ++;
                this.$emit('modelevent',this.count);  // 声明一个触发事件, 事件名称,可携带的参数
            }
        }
    })
</script>
</body>
</html>

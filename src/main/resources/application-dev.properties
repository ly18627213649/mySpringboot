#\u7AEF\u53E3\u53F7
server.port=8080
#druid\u6570\u636E\u5E93\u8FDE\u63A5\u6C60
type=com.alibaba.druid.pool.DruidDataSource


#\u914D\u7F6Emybatis
mybatis.config-location=classpath:mybatis/mybatis-config.xml
mybatis.mapper-locations=classpath:mybatis/mapper/*.xml

#\u6570\u636E\u6E90
spring.datasource.url=jdbc:mysql://localhost:3306/liyang_test?serverTimezone=GMT%2B8&useSSL=true
spring.datasource.username=root
spring.datasource.password=111111
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


#Redis\u914D\u7F6E
spring.redis.database= 0
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.password=root
#\u8FDE\u63A5\u6C60\u6700\u5927\u8FDE\u63A5\u6570\uFF08\u4F7F\u7528\u8D1F\u503C\u8868\u793A\u6CA1\u6709\u9650\u5236\uFF09\u9ED8\u8BA48
spring.redis.lettuce.pool.max-active=8
#\u8FDE\u63A5\u6C60\u6700\u5927\u963B\u585E\u7B49\u5F85\u65F6\u95F4\uFF08\u4F7F\u7528\u8D1F\u503C\u8868\u793A\u6CA1\u6709\u9650\u5236\uFF09\u9ED8\u8BA4-1
spring.redis.lettuce.pool.max-wait=-1
#\u8FDE\u63A5\u6C60\u4E2D\u7684\u6700\u5927\u7A7A\u95F2\u8FDE\u63A5\u9ED8\u8BA48
spring.redis.lettuce.pool.max-idle=8
#\u8FDE\u63A5\u6C60\u4E2D\u7684\u6700\u5C0F\u7A7A\u95F2\u8FDE\u63A5\u9ED8\u8BA40
spring.redis.lettuce.pool.min-idle=0


#=================================\u9875\u9762\u6A21\u677F=======================================#

#\u8BBE\u7F6E\u4E3ALEGACYHTML5\u7F16\u7801\u683C\u5F0F,\u964D\u4F4Ethymeleaf\u5BA1\u6838\u673A\u5236
spring.thymeleaf.mode=LEGACYHTML5

#1.thymeleaf template
#\u5F00\u53D1\u65F6\u5173\u95ED\u7F13\u5B58
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=utf-8
#end

#2.freemark template
spring.freemarker.template-loader-path=classpath:/templates/
spring.freemarker.cache=false
spring.freemarker.charset=UTF-8
spring.freemarker.check-template-location=true
spring.freemarker.content-type=text/html
spring.freemarker.expose-request-attributes=true
spring.freemarker.expose-session-attributes=true
spring.freemarker.request-context-attribute=request
spring.freemarker.suffix=.ftl
spring.freemarker.settings.classic_compatible=true
spring.freemarker.settings.number_format=#
#end

#================================= \u6587\u4EF6\u4E0A\u4F20\u8BBE\u7F6E =======================================#
##\u6700\u5927\u4E0A\u4F20\u6587\u4EF6\u5927\u5C0F
spring.servlet.multipart.max-file-size=2048MB
spring.servlet.multipart.max-request-size=2048MB
#http\u7684post\u8BF7\u6C42\u4E0B\u7684body\u5927\u5C0F\u4E0D\u505A\u9650\u5236,\u8D1F\u6570\u4EE3\u8868\u4E0D\u9650\u5236
server.tomcat.max-http-form-post-size=-1
#\u8BBE\u7F6E\u6587\u4EF6\u4E0A\u4F20\u4E34\u65F6\u4FDD\u5B58\u8DEF\u5F84
spring.servlet.multipart.location=E://upload//temp

